version: '3.9'

services:
  backend:
    build:
      context: ./backend
      dockerfile: Dockerfile
    ports:
      - "8000:8000"
    # OLLAMA_MODEL não é definido aqui — o backend auto-seleciona o melhor
    # modelo disponível no Ollama via model_priority em config/settings.py.
    # Para forçar um modelo específico, adicione: - OLLAMA_MODEL=qwen2.5:7b
    environment:
      - OLLAMA_BASE_URL=http://host.docker.internal:11434/v1
      - OPEN_METEO_BASE_URL=https://api.open-meteo.com/v1
      - REQUEST_TIMEOUT=30
      - LOG_LEVEL=INFO
    extra_hosts:
      - "host.docker.internal:host-gateway"
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8000/"]
      interval: 10s
      timeout: 5s
      retries: 3
    restart: unless-stopped

  frontend:
    build:
      context: ./frontend
      dockerfile: Dockerfile
    ports:
      - "5173:80"
    depends_on:
      backend:
        condition: service_healthy
    restart: unless-stopped
